<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluentGermanAI — Learn German with AI</title>
  <meta name="description" content="AI-powered German language learning app. Practice conversation, grammar, vocabulary and more with your personal AI tutor." />
  <meta name="theme-color" content="#0f0a1e" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ═══════════════════ APP LAYOUT ═══════════════════ -->
  <div class="app-layout">

    <!-- ── Desktop Sidebar ─────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <!-- Brand -->
        <a class="sidebar-brand" href="#/">
          <div class="sidebar-brand-icon">DE</div>
          <div class="sidebar-brand-text">
            <span class="sidebar-brand-name">FluentGermanAI</span>
          </div>
        </a>

        <!-- Nav: Main -->
        <nav class="sidebar-nav">
          <a class="sidebar-link active" href="#/" data-tab="home" id="side-home">
            <i class="fa-solid fa-house"></i>
            <span>Dashboard</span>
          </a>

          <div class="sidebar-section-label">LEARN</div>
          <a class="sidebar-link" href="#/vocab" data-tab="vocab">
            <i class="fa-solid fa-book"></i>
            <span>Library</span>
          </a>
          <a class="sidebar-link" href="#/practice" data-tab="practice">
            <i class="fa-solid fa-play"></i>
            <span>Study</span>
          </a>
          <a class="sidebar-link" href="#/ai/tutor" data-tab="ai" id="side-ai">
            <i class="fa-solid fa-robot"></i>
            <span>AI Tutor</span>
          </a>
          <a class="sidebar-link" href="#/learn" data-tab="learn" id="side-learn">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Lessons</span>
          </a>
          <a class="sidebar-link" href="#/ai/stories" data-tab="stories">
            <i class="fa-solid fa-file-invoice"></i>
            <span>Summaries</span>
          </a>
          <a class="sidebar-link" href="#/vocab" data-tab="folders">
            <i class="fa-solid fa-folder"></i>
            <span>Folders</span>
          </a>

          <div class="sidebar-section-label">TEST</div>
          <a class="sidebar-link" href="#/level-test/A1" data-tab="exam">
            <i class="fa-solid fa-file-circle-check"></i>
            <span>Exam Mode</span>
          </a>
          <a class="sidebar-link" href="#/practice" data-tab="exam-lab">
            <i class="fa-solid fa-vial"></i>
            <span>Exam Lab</span>
          </a>
          <a class="sidebar-link" href="#/review" data-tab="wrong-answers">
            <i class="fa-solid fa-circle-xmark"></i>
            <span>Wrong Answers</span>
          </a>
          <a class="sidebar-link" href="#/practice/challenge" data-tab="battle">
            <i class="fa-solid fa-bolt-lightning"></i>
            <span>Brain Battle</span>
          </a>

          <div class="sidebar-section-label">TRACK</div>
          <a class="sidebar-link" href="#/progress" data-tab="progress" id="side-progress">
            <i class="fa-solid fa-chart-simple"></i>
            <span>Analytics</span>
          </a>
          <a class="sidebar-link" href="#/settings" data-tab="study-plan">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Study Plan</span>
          </a>
          <a class="sidebar-link" href="#/settings" data-tab="goals">
            <i class="fa-solid fa-bullseye"></i>
            <span>Goals</span>
          </a>
          <a class="sidebar-link" href="#/progress" data-tab="insights">
            <i class="fa-solid fa-receipt"></i>
            <span>Weekly Insights</span>
          </a>
        </nav>

        <!-- Sidebar Footer — Theme + User -->
        <div class="sidebar-footer">
          <!-- Theme Picker Swatches -->
          <div class="sidebar-theme-picker" id="side-theme-picker">
            <div class="theme-swatch-mini active" data-theme="midnight" style="background:#8b5cf6" title="Midnight"></div>
            <div class="theme-swatch-mini" data-theme="light"    style="background:#cbd5e1" title="Light"></div>
            <div class="theme-swatch-mini" data-theme="neon"     style="background:#ff007f" title="Neon"></div>
            <div class="theme-swatch-mini" data-theme="ocean"    style="background:#0ea5e9" title="Ocean"></div>
            <div class="theme-swatch-mini" data-theme="forest"   style="background:#10b981" title="Forest"></div>
            <div class="theme-swatch-mini" data-theme="sunset"   style="background:#f97316" title="Sunset"></div>
          </div>

          <!-- User Card -->
          <div class="sidebar-user" id="sidebar-user" onclick="App.navigate('/settings')">
            <div class="sidebar-user-avatar" id="sidebar-avatar">M</div>
            <div class="sidebar-user-info">
              <div class="sidebar-user-name" id="sidebar-username">Learner</div>
              <div class="flex-between">
                <div class="sidebar-user-level" id="sidebar-level">Level 1</div>
                <div class="text-xs text-gold fw-900 ml-1">👑</div>
              </div>
            </div>
            <div class="sidebar-user-logout" onclick="event.stopPropagation(); logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Main Column ─────────────────────────────────── -->
    <div class="main-column">
      <!-- Top Header (Mobile only) -->
      <header class="app-header" id="app-header">
        <div class="header-inner">
          <a class="logo" href="#/">
            <span class="logo-text">Fluent<span class="logo-accent">GermanAI</span></span>
          </a>
          <div class="header-stats" id="header-stats"></div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="app-main" id="app-root">
        <div class="loading-screen">
          <div class="loading-logo">🇩🇪</div>
          <div class="loading-text">FluentGermanAI</div>
          <div class="loading-spinner"></div>
        </div>
      </main>
    </div>

  </div>

  <!-- Bottom Navigation (Mobile only) -->
  <nav class="bottom-nav" id="bottom-nav">
    <a class="nav-item active" href="#/" data-tab="home" id="nav-home">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a class="nav-item" href="#/learn" data-tab="learn" id="nav-learn">
      <i class="fa-solid fa-book-open"></i>
      <span>Learn</span>
    </a>
    <a class="nav-item nav-ai" href="#/ai" data-tab="ai" id="nav-ai">
      <i class="fa-solid fa-robot"></i>
      <span>AI</span>
    </a>
    <a class="nav-item" href="#/practice" data-tab="practice" id="nav-practice">
      <i class="fa-solid fa-bullseye"></i>
      <span>Practice</span>
    </a>
    <a class="nav-item" href="#/progress" data-tab="progress" id="nav-progress">
      <i class="fa-solid fa-user"></i>
      <span>Me</span>
    </a>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <div class="modal-header" id="modal-header"></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- XP Popup -->
  <div class="xp-popup" id="xp-popup"></div>

  <!-- Scripts -->
  <script src="/js/storage.js"></script>
  <script src="/js/audio-fx.js"></script>
  <script src="/js/ui-utils.js"></script>
  <script src="/js/gamification.js"></script>
  <script src="/js/srs.js"></script>
  <script src="/js/speech.js"></script>
  <script src="/js/ai.js"></script>
  <script src="/js/data/vocabulary.js"></script>
  <script src="/js/data/grammar.js"></script>
  <script src="/js/data/phrases.js"></script>
  <script src="/js/data/alphabet.js"></script>
  <script src="/js/screens/dashboard.js"></script>
  <script src="/js/screens/lesson.js"></script>
  <script src="/js/screens/practice.js"></script>
  <script src="/js/screens/flashcards.js"></script>
  <script src="/js/screens/homework.js"></script>
  <script src="/js/screens/ai-chat.js"></script>
  <script src="/js/screens/ai-writing.js"></script>
  <script src="/js/screens/ai-stories.js"></script>
  <script src="/js/screens/ai-tutor.js"></script>
  <script src="/js/screens/progress.js"></script>
  <script src="/js/screens/settings.js"></script>
  <script src="/js/screens/onboarding.js"></script>
  <script src="/js/screens/level-test.js"></script>
  <script src="/js/screens/vocab-browser.js"></script>
  <script src="/js/screens/smart-review.js"></script>
  <script src="/js/screens/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
